<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CashWin BD - রিয়েল ইনকাম</title>
    <style>
        body { font-family: Arial, sans-serif; margin:0; background: linear-gradient(#0f0c29, #302b63); color: white; min-height: 100vh; }
        .header { background: linear-gradient(#6a11cb, #2575fc); padding: 20px; text-align: center; font-size: 26px; }
        .balance { text-align: center; padding: 25px; background: rgba(0,0,0,0.4); font-size: 28px; }
        button { width: 90%; margin: 12px auto; display: block; padding: 18px; font-size: 18px; border: none; border-radius: 12px; color: white; }
        .game-btn { background: #ff3366; }
        .ad-btn { background: #00cc66; }
        .refer-btn { background: #3366ff; }
    </style>
</head>
<body>
    <div class="header">💰 CashWin BD</div>
    <div class="balance">ব্যালেন্স: <span id="balance">0</span> টাকা</div>

    <div style="padding: 20px;">
        <button class="game-btn" onclick="playGame()">🎮 গেম খেলুন</button>
        <button class="ad-btn" onclick="watchAd()">📺 অ্যাড দেখুন (১৫-৫০ টাকা)</button>
        <button class="refer-btn" onclick="referFriend()">👥 রেফার করুন</button>
        <button onclick="goToProfile()">👤 প্রোফাইল</button>
        <button onclick="logout()">লগআউট</button>
    </div>

    <script type="module">
        import { auth, db } from "./js/firebase.js";
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
        import { ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js";

        let currentUser = null;

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "login.html";
                return;
            }
            currentUser = user;
            loadBalance(user.uid);
        });

        function loadBalance(uid) {
            const userRef = ref(db, 'users/' + uid);
            onValue(userRef, (snapshot) => {
                const data = snapshot.val();
                document.getElementById('balance').textContent = data?.balance || 0;
            });
        }

        window.playGame = () => {
            if (!currentUser) return;
            const earn = Math.floor(Math.random() * 85) + 25;
            const userRef = ref(db, 'users/' + currentUser.uid);
            update(userRef, { balance: (parseInt(document.getElementById('balance').textContent) || 0) + earn });
            alert(`🎉 আপনি ${earn} টাকা জিতেছেন!`);
        };

        window.watchAd = () => {
            if (!currentUser) return;
            const earn = Math.floor(Math.random() * 40) + 15;
            const userRef = ref(db, 'users/' + currentUser.uid);
            update(userRef, { balance: (parseInt(document.getElementById('balance').textContent) || 0) + earn });
            alert(`📺 অ্যাড দেখে ${earn} টাকা পেয়েছেন!`);
        };

        window.referFriend = () => {
            alert("✅ রেফারেল লিংক কপি হয়েছে!\nপ্রতি সফল রেফারে ৮০ টাকা পাবেন।");
        };

        window.goToProfile = () => window.location.href = "profile.html";
        window.logout = () => signOut(auth).then(() => window.location.href = "login.html");
    </script>
</body>
</html>
