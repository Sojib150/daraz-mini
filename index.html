<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soul Sync Game</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #111;
    color: white;
}

button {
    padding: 10px;
    margin: 5px;
    background: #ff4b5c;
    border: none;
    color: white;
    border-radius: 5px;
}

input {
    padding: 10px;
    width: 80%;
    margin: 10px;
}
</style>
</head>

<body>

<h2>💞 Soul Sync</h2>

<div id="home">
    <button onclick="createRoom()">Create Room</button>
    <br>
    <input id="roomId" placeholder="Enter Room Code">
    <button onclick="joinRoom()">Join</button>
</div>

<div id="game" style="display:none;">
    <h3 id="question"></h3>
    <input id="answer" placeholder="Your answer">
    <button onclick="submitAnswer()">Submit</button>
</div>

<div id="result" style="display:none;">
    <h2 id="match"></h2>
</div>

<!-- Firebase v10 (IMPORTANT FIX) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM",
  authDomain: "seen-a1d92.firebaseapp.com",
  databaseURL: "https://seen-a1d92-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "seen-a1d92",
  storageBucket: "seen-a1d92.firebasestorage.app",
  messagingSenderId: "868584044532",
  appId: "1:868584044532:web:51f07436a883f88332eba1",
  measurementId: "G-K4W1BWQ53V"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let room = "";
let playerId = "p" + Math.floor(Math.random()*10000);

const questionText = "What is your partner's favorite food?";

window.createRoom = function() {
    room = Math.random().toString(36).substring(2,7);
    alert("Room Code: " + room);
    startGame();
}

window.joinRoom = function() {
    room = document.getElementById("roomId").value;
    startGame();
}

function startGame() {
    document.getElementById("home").style.display = "none";
    document.getElementById("game").style.display = "block";
    document.getElementById("question").innerText = questionText;
}

window.submitAnswer = function() {
    let ans = document.getElementById("answer").value;

    set(ref(db, "rooms/" + room + "/" + playerId), ans);

    onValue(ref(db, "rooms/" + room), (snap) => {
        let data = snap.val();
        if (data && Object.keys(data).length == 2) {
            showResult(data);
        }
    });
}

function showResult(data) {
    document.getElementById("game").style.display = "none";
    document.getElementById("result").style.display = "block";

    let answers = Object.values(data);
    let match = (answers[0] === answers[1]) ? "100% Match ❤️" : "Not Matched 💔";

    document.getElementById("match").innerText = match;
}
</script>

</body>
</html>
