<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <style> body { padding:15px; background:#0f0c29; color:white; } </style>
</head>
<body>
    <h1>👑 অ্যাডমিন প্যানেল</h1>
    <div id="users"></div>

    <script type="module">
        import { auth, db } from "./js/firebase.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
        import { ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js";

        onAuthStateChanged(auth, (user) => {
            if (!user || user.email !== "তোমার_ইমেইল@gmail.com") {  // তোমার ইমেইল দাও
                alert("অ্যাডমিন অ্যাক্সেস নেই");
                window.location.href = "login.html";
            }
        });

        // ইউজার লিস্ট দেখানো
        const usersRef = ref(db, 'users');
        onValue(usersRef, (snapshot) => {
            let html = "<h2>ইউজার লিস্ট</h2>";
            snapshot.forEach(child => {
                const data = child.val();
                html += `<p><b>${data.name || child.key}</b> - ${data.balance || 0} টাকা 
                <button onclick="addBalance('${child.key}', 100)">+100</button></p>`;
            });
            document.getElementById('users').innerHTML = html;
        });

        window.addBalance = (uid, amount) => {
            update(ref(db, 'users/' + uid), { balance: amount });
            alert("টাকা দেওয়া হয়েছে!");
        };
    </script>
</body>
</html>
